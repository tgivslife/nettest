name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.0.0)'
        required: true
        type: string
        default: '1.0.0'

jobs:
  # Determine version from tag or manual input
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          VERSION="${GITHUB_REF_NAME#v}"
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

  # Linux x86_64 (Debian Bullseye - glibc 2.31, compatible with all supported distros)
  build-linux-x86_64:
    needs: [determine-version]
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in Cargo.toml
      run: sed -i "s/^version = .*/version = \"${{ needs.determine-version.outputs.version }}\"/" Cargo.toml

    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y curl build-essential pkg-config libssl-dev libfontconfig1-dev

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Add Rust target
      run: |
        . $HOME/.cargo/env
        rustup target add x86_64-unknown-linux-gnu

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-bullseye-x86_64-unknown-linux-gnu-${{ hashFiles('**/Cargo.lock') }}

    - name: Build for Linux x86_64
      run: |
        . $HOME/.cargo/env
        cargo build --release --target x86_64-unknown-linux-gnu

    - name: Upload binary for release
      uses: actions/upload-artifact@v4
      with:
        name: nettest-linux-x86_64-binary
        path: target/x86_64-unknown-linux-gnu/release/nettest

  # Linux aarch64 (Debian Bullseye - glibc 2.31, compatible with all supported distros)
  build-linux-aarch64:
    needs: [determine-version]
    runs-on: ubuntu-24.04-arm
    container:
      image: arm64v8/debian:bullseye
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in Cargo.toml
      run: sed -i "s/^version = .*/version = \"${{ needs.determine-version.outputs.version }}\"/" Cargo.toml

    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y curl build-essential pkg-config libssl-dev libfontconfig1-dev

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Add Rust target
      run: |
        . $HOME/.cargo/env
        rustup target add aarch64-unknown-linux-gnu

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-bullseye-aarch64-unknown-linux-gnu-${{ hashFiles('**/Cargo.lock') }}

    - name: Build for Linux ARM64
      run: |
        . $HOME/.cargo/env
        cargo build --release --target aarch64-unknown-linux-gnu

    - name: Upload binary for release
      uses: actions/upload-artifact@v4
      with:
        name: nettest-linux-aarch64-binary
        path: target/aarch64-unknown-linux-gnu/release/nettest

  # Windows x86_64
  build-windows-x86_64:
    needs: [determine-version]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in Cargo.toml
      run: sed -i "s/^version = .*/version = \"${{ needs.determine-version.outputs.version }}\"/" Cargo.toml

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc
        override: true

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-x86_64-pc-windows-msvc-${{ hashFiles('**/Cargo.lock') }}

    - name: Build for Windows x86_64
      run: |
        cargo build --release --target x86_64-pc-windows-msvc

    - name: Upload binary for release
      uses: actions/upload-artifact@v4
      with:
        name: nettest-windows-x86_64-binary
        path: target/x86_64-pc-windows-msvc/release/nettest.exe

  # Windows aarch64
  build-windows-aarch64:
    needs: [determine-version]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in Cargo.toml
      run: sed -i "s/^version = .*/version = \"${{ needs.determine-version.outputs.version }}\"/" Cargo.toml

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: aarch64-pc-windows-msvc
        override: true

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-aarch64-pc-windows-msvc-${{ hashFiles('**/Cargo.lock') }}

    - name: Build for Windows ARM64
      run: |
        cargo build --release --target aarch64-pc-windows-msvc

    - name: Upload binary for release
      uses: actions/upload-artifact@v4
      with:
        name: nettest-windows-aarch64-binary
        path: target/aarch64-pc-windows-msvc/release/nettest.exe

  # macOS x86_64 (Intel)
  build-macos-x86_64:
    needs: [determine-version]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in Cargo.toml
      run: sed -i "s/^version = .*/version = \"${{ needs.determine-version.outputs.version }}\"/" Cargo.toml

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: x86_64-apple-darwin
        override: true

    - name: Install system dependencies
      run: |
        brew install pkg-config openssl fontconfig

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-x86_64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}

    - name: Build for macOS Intel
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
      run: |
        cargo build --release --target x86_64-apple-darwin

    - name: Upload binary for release
      uses: actions/upload-artifact@v4
      with:
        name: nettest-macos-x86_64-binary
        path: target/x86_64-apple-darwin/release/nettest

  # macOS aarch64 (Apple Silicon)
  build-macos-aarch64:
    needs: [determine-version]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set version in Cargo.toml
      run: sed -i "s/^version = .*/version = \"${{ needs.determine-version.outputs.version }}\"/" Cargo.toml

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: aarch64-apple-darwin
        override: true

    - name: Install system dependencies
      run: |
        brew install pkg-config openssl fontconfig

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-aarch64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}

    - name: Build for macOS Apple Silicon
      env:
        PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
      run: |
        cargo build --release --target aarch64-apple-darwin

    - name: Upload binary for release
      uses: actions/upload-artifact@v4
      with:
        name: nettest-macos-aarch64-binary
        path: target/aarch64-apple-darwin/release/nettest

  # Create releases for all platforms
  create-all-releases:
    needs: [
      determine-version,
      build-linux-x86_64,
      build-linux-aarch64,
      build-windows-x86_64,
      build-windows-aarch64,
      build-macos-x86_64,
      build-macos-aarch64
    ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all binaries
      uses: actions/download-artifact@v4

    - name: List downloaded files
      run: |
        echo "Listing downloaded files:"
        find . -name "nettest*" -type f | head -20

    - name: Create archives with binaries
      run: |
        # Create Linux x86_64 archive
        if [ -f "nettest-linux-x86_64-binary/nettest" ]; then
          cp nettest-linux-x86_64-binary/nettest nettest
          chmod +x nettest
          tar -czf nettest-linux-x86_64.tar.gz nettest
          rm nettest
        fi

        # Create Linux aarch64 archive
        if [ -f "nettest-linux-aarch64-binary/nettest" ]; then
          cp nettest-linux-aarch64-binary/nettest nettest
          chmod +x nettest
          tar -czf nettest-linux-aarch64.tar.gz nettest
          rm nettest
        fi

        # Create Windows x86_64 archive
        if [ -f "nettest-windows-x86_64-binary/nettest.exe" ]; then
          cp nettest-windows-x86_64-binary/nettest.exe nettest.exe
          zip nettest-windows-x86_64.zip nettest.exe
          rm nettest.exe
        fi

        # Create Windows aarch64 archive
        if [ -f "nettest-windows-aarch64-binary/nettest.exe" ]; then
          cp nettest-windows-aarch64-binary/nettest.exe nettest.exe
          zip nettest-windows-aarch64.zip nettest.exe
          rm nettest.exe
        fi

        # Create macOS x86_64 archive
        if [ -f "nettest-macos-x86_64-binary/nettest" ]; then
          cp nettest-macos-x86_64-binary/nettest nettest
          chmod +x nettest
          tar -czf nettest-macos-x86_64.tar.gz nettest
          rm nettest
        fi

        # Create macOS aarch64 archive
        if [ -f "nettest-macos-aarch64-binary/nettest" ]; then
          cp nettest-macos-aarch64-binary/nettest nettest
          chmod +x nettest
          tar -czf nettest-macos-aarch64.tar.gz nettest
          rm nettest
        fi

    - name: Create versioned release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.determine-version.outputs.version }}
        name: Release v${{ needs.determine-version.outputs.version }}
        body: |
          ## Release v${{ needs.determine-version.outputs.version }}

          ### Downloads

          #### Linux
          Built on Debian 11 (Bullseye) with glibc 2.31 — compatible with Debian 11+, Ubuntu 22.04+, RHEL 8+, CentOS Stream 9+, and other distributions with glibc >= 2.31.
          - **Linux x86_64**: [nettest-linux-x86_64.tar.gz](https://github.com/${{ github.repository }}/releases/download/v${{ needs.determine-version.outputs.version }}/nettest-linux-x86_64.tar.gz)
          - **Linux ARM64**: [nettest-linux-aarch64.tar.gz](https://github.com/${{ github.repository }}/releases/download/v${{ needs.determine-version.outputs.version }}/nettest-linux-aarch64.tar.gz)

          #### macOS
          - **macOS Apple Silicon**: [nettest-macos-aarch64.tar.gz](https://github.com/${{ github.repository }}/releases/download/v${{ needs.determine-version.outputs.version }}/nettest-macos-aarch64.tar.gz)
          - **macOS Intel**: [nettest-macos-x86_64.tar.gz](https://github.com/${{ github.repository }}/releases/download/v${{ needs.determine-version.outputs.version }}/nettest-macos-x86_64.tar.gz)

          #### Windows
          - **Windows x86_64**: [nettest-windows-x86_64.zip](https://github.com/${{ github.repository }}/releases/download/v${{ needs.determine-version.outputs.version }}/nettest-windows-x86_64.zip)
          - **Windows ARM64**: [nettest-windows-aarch64.zip](https://github.com/${{ github.repository }}/releases/download/v${{ needs.determine-version.outputs.version }}/nettest-windows-aarch64.zip)

          ### Installation

          #### Linux/macOS
          ```bash
          # Download and extract
          wget https://github.com/${{ github.repository }}/releases/download/v${{ needs.determine-version.outputs.version }}/nettest-linux-x86_64.tar.gz
          tar -xzf nettest-linux-x86_64.tar.gz

          # Run
          ./nettest -s  # Server
          ./nettest -c <address>  # Client
          ```

          #### Windows
          ```powershell
          # Download and extract
          Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/v${{ needs.determine-version.outputs.version }}/nettest-windows-x86_64.zip" -OutFile "nettest-windows-x86_64.zip"
          Expand-Archive -Path "nettest-windows-x86_64.zip" -DestinationPath "."

          # Run
          .\nettest.exe -s  # Server
          .\nettest.exe -c <address>  # Client
          ```
        files: |
          nettest-linux-x86_64.tar.gz
          nettest-linux-aarch64.tar.gz
          nettest-windows-x86_64.zip
          nettest-windows-aarch64.zip
          nettest-macos-x86_64.tar.gz
          nettest-macos-aarch64.tar.gz
        token: ${{ secrets.GITHUB_TOKEN }}
        overwrite: true
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
